apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cobalt-chart.fullname" . }}
  labels:
    {{- include "cobalt-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cobalt-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cobalt-chart.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if and .Values.aiVideo.enabled .Values.aiVideo.serviceAccountName }}
      serviceAccountName: {{ .Values.aiVideo.serviceAccountName | quote }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          volumeMounts:
            - mountPath: /app/src/cookies.json
              name: cookies-volume
              subPath: cookie/cookies.json
            {{- if .Values.wechatpay.enabled }}
            - mountPath: {{ .Values.wechatpay.privateKeyMountPath | quote }}
              name: wechatpay-secret
              readOnly: true
            {{- end }}
          env:
            - name: API_URL
              value: https://api.freesavevideo.online/
            - name: API_PORT
              value: '80'
            - name: API_NAME
              value: freesavevideo-api
            - name: CORS_WILDCARD
              value: '0'
            - name: CORS_URL
              value: https://freesavevideo.online,https://www.freesavevideo.online
            - name: RATELIMIT_WINDOW
              value: '60'
            - name: RATELIMIT_MAX
              value: '30'
            - name: BATCH_MAX_ITEMS
              value: {{ .Values.batchMaxItems | default 20 | quote }}
            - name: TUNNEL_LIFESPAN
              value: {{ .Values.tunnelLifespanSeconds | default 90 | quote }}
            - name: TUNNEL_RATELIMIT_WINDOW
              value: '60'
            - name: TUNNEL_RATELIMIT_MAX
              value: {{ .Values.tunnelRateLimitMax | default 120 | quote }}
            - name: TURNSTILE_SITEKEY
              value: 0x4AAAAAAAw8jRb9G7cWXnbd
            - name: COOKIE_PATH
              value: src/cookies.json
            {{- with .Values.upstream }}
            {{- if or .urls .globalUrls .cnUrls }}
            {{- if .urls }}
            - name: UPSTREAM_URLS
              value: {{ .urls | quote }}
            {{- end }}
            {{- if .globalUrls }}
            - name: UPSTREAM_GLOBAL_URLS
              value: {{ .globalUrls | quote }}
            {{- end }}
            {{- if .cnUrls }}
            - name: UPSTREAM_CN_URLS
              value: {{ .cnUrls | quote }}
            {{- end }}
            {{- if .apiKey }}
            - name: UPSTREAM_API_KEY
              value: {{ .apiKey | quote }}
            {{- end }}
            - name: UPSTREAM_TIMEOUT_MS
              value: {{ .timeoutMs | default 12000 | quote }}
            - name: UPSTREAM_YOUTUBE_HEADERS_TIMEOUT_MS
              value: {{ .youtubeHeadersTimeoutMs | default 20000 | quote }}
            - name: UPSTREAM_BODY_TIMEOUT_MS
              value: {{ .bodyTimeoutMs | default 5000 | quote }}
            - name: UPSTREAM_MAX_ATTEMPTS
              value: {{ .maxAttempts | default 2 | quote }}
            - name: UPSTREAM_CIRCUIT_FAILURES
              value: {{ .circuitFailures | default 3 | quote }}
            - name: UPSTREAM_CIRCUIT_COOLDOWN_MS
              value: {{ .circuitCooldownMs | default 60000 | quote }}
            - name: UPSTREAM_HEALTH_CHECK_INTERVAL_MS
              value: {{ .healthCheckIntervalMs | default 600000 | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.instagram }}
            {{- if .upstreamUrl }}
            - name: INSTAGRAM_UPSTREAM_URL
              value: {{ .upstreamUrl | quote }}
            {{- if .upstreamApiKey }}
            - name: INSTAGRAM_UPSTREAM_API_KEY
              value: {{ .upstreamApiKey | quote }}
            {{- end }}
            - name: INSTAGRAM_UPSTREAM_TIMEOUT_MS
              value: {{ .upstreamTimeoutMs | default 12000 | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.douyin }}
            {{- if .upstreamMinBytes }}
            - name: DOUYIN_UPSTREAM_MIN_BYTES
              value: {{ .upstreamMinBytes | quote }}
            {{- end }}
            {{- end }}
            # Database Configuration
            - name: DB_TYPE
              value: {{ .Values.database.type | quote }}
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.database.password | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            # Admin Configuration
            - name: ADMIN_USERNAME
              value: {{ .Values.admin.username | quote }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.admin.password | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.admin.email | quote }}
            # JWT Secret
            - name: JWT_SECRET
              value: {{ .Values.jwt.secret | quote }}
            # Clerk Configuration (created separately as a Kubernetes Secret)
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-secret
                  key: CLERK_SECRET_KEY
            - name: CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-secret
                  key: CLERK_PUBLISHABLE_KEY
            {{- if .Values.aiVideo.enabled }}
            - name: AI_VIDEO_ENABLED
              value: "1"
            - name: AI_VIDEO_STORAGE_PROVIDER
              value: {{ .Values.aiVideo.storageProvider | quote }}
            - name: AI_VIDEO_GCS_BUCKET
              value: {{ .Values.aiVideo.gcsBucket | quote }}
            - name: AI_VIDEO_STORAGE_PREFIX
              value: {{ .Values.aiVideo.storagePrefix | quote }}
            - name: AI_VIDEO_LOCAL_STORAGE_ROOT
              value: {{ .Values.aiVideo.localStorageRoot | quote }}
            - name: AI_VIDEO_MONTHLY_SECONDS
              value: {{ .Values.aiVideo.monthlySeconds | quote }}
            - name: AI_VIDEO_MAX_FILE_BYTES
              value: {{ .Values.aiVideo.maxFileBytes | quote }}
            - name: AI_VIDEO_MAX_DURATION_SECONDS
              value: {{ .Values.aiVideo.maxDurationSeconds | quote }}
            - name: AI_VIDEO_UPLOAD_CHUNK_BYTES
              value: {{ .Values.aiVideo.uploadChunkBytes | quote }}
            - name: AI_VIDEO_UPLOAD_GLOBAL_CONCURRENCY
              value: {{ .Values.aiVideo.uploadGlobalConcurrency | quote }}
            - name: AI_VIDEO_UPLOAD_SESSION_TTL_MS
              value: {{ .Values.aiVideo.uploadSessionTtlMs | quote }}
            - name: AI_VIDEO_UPLOAD_STALL_TIMEOUT_MS
              value: {{ .Values.aiVideo.uploadStallTimeoutMs | quote }}
            - name: AI_VIDEO_UPLOAD_SESSION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aiVideo.secretName | quote }}
                  key: {{ .Values.aiVideo.uploadSessionEncryptionKeySecretKey | quote }}
            - name: AI_VIDEO_MEDIA_IMPORT_TOKEN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aiVideo.secretName | quote }}
                  key: {{ .Values.aiVideo.mediaImportTokenKeySecretKey | quote }}
            {{- end }}
            {{- if .Values.polar.enabled }}
            # Polar checkout - Credits top-up
            - name: POLAR_SERVER
              value: {{ .Values.polar.server | quote }}
            - name: POLAR_WEBHOOK_URL
              value: {{ .Values.polar.webhookUrl | quote }}
            - name: POLAR_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polar.secretName | quote }}
                  key: POLAR_ACCESS_TOKEN
            - name: POLAR_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polar.secretName | quote }}
                  key: POLAR_WEBHOOK_SECRET
            - name: POLAR_PRODUCT_ID_USD_199
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polar.secretName | quote }}
                  key: POLAR_PRODUCT_ID_USD_199
            - name: POLAR_PRODUCT_ID_USD_499
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polar.secretName | quote }}
                  key: POLAR_PRODUCT_ID_USD_499
            - name: POLAR_PRODUCT_ID_USD_999
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polar.secretName | quote }}
                  key: POLAR_PRODUCT_ID_USD_999
            - name: POLAR_PRODUCT_ID_USD_1999
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polar.secretName | quote }}
                  key: POLAR_PRODUCT_ID_USD_1999
            - name: POLAR_PRODUCT_ID_USD_4999
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polar.secretName | quote }}
                  key: POLAR_PRODUCT_ID_USD_4999
            {{- end }}
            {{- if .Values.wechatpay.enabled }}
            # WeChat Pay (API v3) - Credits top-up
            - name: WECHATPAY_MCH_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.wechatpay.secretName | quote }}
                  key: WECHATPAY_MCH_ID
            - name: WECHATPAY_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.wechatpay.secretName | quote }}
                  key: WECHATPAY_APP_ID
            - name: WECHATPAY_SERIAL_NO
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.wechatpay.secretName | quote }}
                  key: WECHATPAY_SERIAL_NO
            - name: WECHATPAY_API_V3_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.wechatpay.secretName | quote }}
                  key: WECHATPAY_API_V3_KEY
            - name: WECHATPAY_PRIVATE_KEY_PATH
              value: {{ printf "%s/%s" .Values.wechatpay.privateKeyMountPath .Values.wechatpay.privateKeyFile | quote }}
            - name: WECHATPAY_NOTIFY_URL
              value: {{ .Values.wechatpay.notifyUrl | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        - name: additional-container
          image: "gcr.io/ebay-mag/kubein@sha256:7faf00eb016f17e4fc1c44381c1d2325baf481ec800d63a186af5dec8b8c6664"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo 'This is an additional container' && sleep 3600"]
          env:
            - name: EXAMPLE_ENV
              value: example_value
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
      volumes:
        - name: cookies-volume
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-pvc
        {{- if .Values.wechatpay.enabled }}
        - name: wechatpay-secret
          secret:
            secretName: {{ .Values.wechatpay.secretName | quote }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
